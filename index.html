<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>，Roblox [user] to [ID] 轉換器 v1.60</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0b0f1a;
            --card-bg: rgba(20, 28, 45, 0.85);
            --accent: #4ade80;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #16213e 0%, #0b0f1a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 科技背景 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            width: 95%; /* 自動調整大小關鍵 */
            max-width: 450px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .version-badge {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 10px;
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }

        h2 {
            margin: 0 0 20px 0;
            letter-spacing: 3px;
            background: linear-gradient(to right, #00d2ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        /* 輸入框設計 */
        .input-box {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* 結果區動畫 */
        #result-area {
            margin-top: 25px;
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 人偶圖片樣式 */
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 2px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .id-text {
            font-size: 28px;
            font-family: 'Courier New', monospace;
            color: var(--primary);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
            margin: 5px 0;
            display: block;
        }

        .status-msg {
            font-size: 13px;
            color: #888;
            margin-top: 15px;
        }

        footer { margin-top: 25px; font-size: 11px; color: #555; }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="card">
    <div class="version-badge">v1.60 SYSTEM</div>
    <h2>TRTC 數據轉換</h2>
    
    <input type="text" id="username" class="input-box" placeholder="輸入玩家名稱 (例如 @roblox)" spellcheck="false">
    <button onclick="lookup()" id="search-btn">讀取玩家數據</button>
    
    <div id="result-area">
        <div class="avatar-container">
            <img id="avatar-img" src="" alt="Avatar">
        </div>
        <div id="user-display" style="font-size: 14px; color: #aaa;"></div>
        <span id="id-value" class="id-text">----</span>
        <button style="background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 10px;" onclick="copyId()">複製 ID</button>
    </div>
    
    <div id="status" class="status-msg">系統就緒</div>

    <footer>
        DEVELEOPED BY 元界創想 is Gemini
    </footer>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvfhmjSroMeuHxcZpvZ9RG-DYVgQKZBZ6j0WWA1Gqgmq3Jt7VPuSqTrzm_BoWjmVmHsw/exec";

    async function lookup() {
        const username = document.getElementById('username').value.trim().replace('@', '');
        const status = document.getElementById('status');
        const resArea = document.getElementById('result-area');
        const btn = document.getElementById('search-btn');

        if (!username) return;

        // UI 初始化
        btn.disabled = true;
        btn.innerText = "連線中...";
        status.innerText = "📡 正在向 Roblox 請求核心數據...";
        resArea.style.display = 'none';

        try {
            // 1. 取得玩家 ID (透過你的 GAS)
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ username: username })
            });
            const data = await response.json();

            if (data && data.data && data.data.length > 0) {
                const user = data.data[0];
                const userId = user.id;

                // 2. 取得玩家人偶圖片 (使用 Roblox 官方 Thumbnail API)
                // 不需要經過 GAS，因為這是 GET 請求且支援跨域
                const thumbUrl = `https://thumbnails.roblox.com/v1/users/avatar-bust?userIds=${userId}&size=150x150&format=Png&isCircular=true`;
                const thumbRes = await fetch(thumbUrl);
                const thumbData = await thumbRes.json();
                
                if (thumbData.data && thumbData.data.length > 0) {
                    document.getElementById('avatar-img').src = thumbData.data[0].imageUrl;
                }

                // 3. 顯示結果
                document.getElementById('id-value').innerText = userId;
                document.getElementById('user-display').innerText = `${user.displayName} (@${user.name})`;
                resArea.style.display = 'block';
                status.innerText = "✅ 數據同步完成";
            } else {
                status.innerText = "❌ 錯誤：找不到該玩家";
            }
        } catch (err) {
            status.innerText = "⚠️ 通訊攔截：請檢查後端狀態";
        } finally {
            btn.disabled = false;
            btn.innerText = "讀取玩家數據";
        }
    }

    function copyId() {
        const id = document.getElementById('id-value').innerText;
        navigator.clipboard.writeText(id).then(() => {
            alert("ID 已複製到剪貼簿！");
        });
    }
</script>

</body>
</html>
