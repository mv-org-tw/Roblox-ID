<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox (User) to (ID) 轉換器</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0b0f1a;
            --card-bg: rgba(20, 28, 45, 0.9);
            --accent: #4ade80;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
            background: radial-gradient(circle at center, #16213e 0%, #0b0f1a 100%);
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            width: 90%; max-width: 440px;
            text-align: center; position: relative;
        }

        .version-tag {
            position: absolute; top: 18px; left: 20px;
            font-size: 10px; color: var(--primary);
            letter-spacing: 1px; font-weight: bold; opacity: 0.8;
        }

        h2 { margin: 10px 0 5px 0; font-size: 1.4rem; letter-spacing: 1px; color: #fff; }
        .sub-title { font-size: 0.85rem; color: var(--primary); margin-bottom: 25px; font-weight: bold; text-transform: uppercase; }

        .input-box {
            width: 100%; padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; color: white;
            font-size: 16px; margin-bottom: 15px;
            text-align: center; transition: 0.3s;
        }

        .input-box:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        button {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #result-area { margin-top: 30px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .avatar-frame {
            width: 110px; height: 110px; margin: 0 auto 15px;
            background: #000; border-radius: 50%;
            border: 3px solid var(--primary); overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        #avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .id-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        #id-value { font-size: 32px; font-family: monospace; color: #fff; margin: 5px 0; display: block; }

        .status-msg { font-size: 12px; color: var(--text-dim); margin-top: 20px; }
        .copy-link { color: var(--accent); text-decoration: none; font-size: 13px; cursor: pointer; display: inline-block; margin-top: 10px; border-bottom: 1px dashed var(--accent); }

        footer { margin-top: 35px; font-size: 10px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="card">
    <div class="version-tag">STATION INTERFACE v1.62</div>
    <h2>Roblox (User) to (ID)</h2>
    <div class="sub-title">數據轉換服務</div>
    
    <input type="text" id="username" class="input-box" placeholder="請輸入使用者名稱" autocomplete="off">
    <button onclick="lookup()" id="search-btn">執行轉換程序</button>
    
    <div id="result-area">
        <div class="avatar-frame">
            <img id="avatar-img" src="" alt="">
        </div>
        <div id="user-display" style="font-size: 14px; color: var(--primary); margin-bottom: 10px; font-weight: 500;"></div>
        <div class="id-label">Database Identity Number</div>
        <span id="id-value">----</span>
        <div class="copy-link" onclick="copyId()">點擊複製數據 ID</div>
    </div>
    
    <div id="status" class="status-msg">系統待機中...</div>

    <footer>
        CORE ENGINE BY 元界創想 IS GEMINI
    </footer>
</div>

<script>
    // 已更新為你測試成功的 GAS 網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvfhmjSroMeuHxcZpvZ9RG-DYVgQKZBZ6j0WWA1Gqgmq3Jt7VPuSqTrzm_BoWjmVmHsw/exec";

    async function lookup() {
        const input = document.getElementById('username');
        const username = input.value.trim().replace('@', '');
        const status = document.getElementById('status');
        const resArea = document.getElementById('result-area');
        const btn = document.getElementById('search-btn');

        if (!username) return;

        btn.disabled = true;
        btn.innerText = "數據請求中...";
        status.innerText = "🛰️ 正在發送數據攔截請求...";
        resArea.style.display = 'none';

        try {
            // 向 GAS 發送 POST 請求
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ username: username })
            });
            
            const data = await response.json();

            if (data && data.data && data.data.length > 0) {
                const user = data.data[0];
                const userId = user.id;

                // 取得頭像
                const thumbUrl = `https://thumbnails.roblox.com/v1/users/avatar-bust?userIds=${userId}&size=150x150&format=Png&isCircular=true`;
                const thumbRes = await fetch(thumbUrl);
                const thumbData = await thumbRes.json();
                
                if (thumbData.data && thumbData.data.length > 0) {
                    document.getElementById('avatar-img').src = thumbData.data[0].imageUrl;
                }

                document.getElementById('id-value').innerText = userId;
                document.getElementById('user-display').innerText = `${user.displayName} (@${user.name})`;
                resArea.style.display = 'block';
                status.innerText = "✅ 轉換作業成功完成";
                status.style.color = "#4ade80";
            } else {
                status.innerText = "❌ 警告：目標玩家不存在";
                status.style.color = "#fb7185";
            }
        } catch (err) {
            status.innerText = "⚠️ 錯誤：連線超時或請求失敗";
            status.style.color = "#fb7185";
        } finally {
            btn.disabled = false;
            btn.innerText = "執行轉換程序";
        }
    }

    function copyId() {
        const id = document.getElementById('id-value').innerText;
        navigator.clipboard.writeText(id).then(() => {
            const status = document.getElementById('status');
            status.innerText = "📋 ID 已寫入剪貼簿";
            status.style.color = "#4ade80";
        });
    }
</script>

</body>
</html>
